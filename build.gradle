plugins {
	id 'java-library'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.github.sep-es-br'
version = '1.0.0'

sourceCompatibility = '1.8'
targetCompatibility = '1.8'

repositories {
	mavenCentral()
}

dependencies {
    api 'org.springframework.boot:spring-boot-starter-oauth2-client:2.2.12.RELEASE'
    api 'org.springframework.security:spring-security-oauth2-core:5.2.12.RELEASE'
    api 'org.springframework.boot:spring-boot-starter-web:2.2.12.RELEASE'
    api 'org.springframework.boot:spring-boot-starter-webflux:2.2.12.RELEASE'
    api 'org.json:json:20190722'
}
